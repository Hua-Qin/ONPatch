name: Android CI

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    name: Android Build
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: '%compiler% -dumpmachine; %compiler% -dumpversion'
      CCACHE_NOHASHDIR: 'true'
      CCACHE_HARDLINK: 'true'
      CCACHE_BASEDIR: '${{ github.workspace }}'

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: 'false'
        fetch-depth: 0

    - name: Checkout core submodule manually
      run: |
        rm -rf core
        git clone --depth 2000 https://github.com/LSPosed/LSPosed.git core
        cd core
        git checkout df74d83eb03a44cc6ad268841ac2ada28d077c77
        git submodule update --init --recursive

    - name: Init manifest-editor submodule
      run: |
        git submodule update --init patch/libs/manifest-editor

    - name: Checkout libxposed/api
      run: |
        git clone https://github.com/libxposed/api.git libxposed/api
        cd libxposed/api
        git checkout 55efdf9
        cd ../..

    - name: Write key
      if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
      run: |
        if [ ! -z "${{ secrets.KEY_STORE }}" ]; then
          echo androidStorePassword='${{ secrets.KEY_STORE }}' >> gradle.properties
          echo androidKeyAlias='${{ secrets.ALIAS }}' >> gradle.properties
          echo androidKeyPassword='${{ secrets.KEY_PASSWORD }}' >> gradle.properties
          echo androidStoreFile='key.jks' >> gradle.properties
          echo ${{ secrets.KEY_STORE }} | base64 --decode > key.jks
        fi

    - name: Patch LSPosedContext for api 55efdf9 compatibility
      run: |
        python3 << 'PYEOF'
        f = 'core/core/src/main/java/org/lsposed/lspd/impl/LSPosedContext.java'
        with open(f, 'r') as fh:
            lines = fh.readlines()

        # Methods to add:
        # 1. invokeOrigin(Constructor<T>, T, Object...) after invokeOrigin(Method,...)
        # 2. invokeSpecial(Constructor<T>, T, Object...) after invokeSpecial(Method,...)

        invokeOrigin_ctor = [
            '\n',
            '    @Override\n',
            '    public <T> void invokeOrigin(@NonNull Constructor<T> constructor, @NonNull T thisObject, Object... args) throws InvocationTargetException, IllegalArgumentException, IllegalAccessException {\n',
            '        HookBridge.invokeOriginalMethod(constructor, thisObject, args);\n',
            '    }\n',
        ]

        invokeSpecial_ctor = [
            '\n',
            '    @Override\n',
            '    public <T> void invokeSpecial(@NonNull Constructor<T> constructor, @NonNull T thisObject, Object... args) throws InvocationTargetException, IllegalArgumentException, IllegalAccessException {\n',
            '        HookBridge.invokeSpecialMethod(constructor, getExecutableShorty(constructor), constructor.getDeclaringClass(), thisObject, args);\n',
            '    }\n',
        ]

        new_lines = []
        i = 0
        while i < len(lines):
            new_lines.append(lines[i])
            # After invokeOrigin(Method,...) closing brace
            if 'return HookBridge.invokeOriginalMethod(method,' in lines[i]:
                i += 1
                new_lines.append(lines[i])  # the "    }"
                for il in invokeOrigin_ctor:
                    new_lines.append(il)
                i += 1
                continue
            # After invokeSpecial(Method,...) closing brace
            if 'return HookBridge.invokeSpecialMethod(method,' in lines[i]:
                i += 1
                new_lines.append(lines[i])  # the "    }"
                for il in invokeSpecial_ctor:
                    new_lines.append(il)
                i += 1
                continue
            i += 1

        with open(f, 'w') as fh:
            fh.writelines(new_lines)
        PYEOF

    - name: Checkout libxposed/service
      uses: actions/checkout@v4
      with:
        repository: libxposed/service
        ref: '100'
        path: libxposed/service

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-home-cache-cleanup: true

    - name: Set up ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        max-size: 2G
        key: ${{ runner.os }}-v2
        restore-keys: ${{ runner.os }}-v2
        save: ${{ github.event_name == 'push' }}

    - name: Build libxposed dependencies
      working-directory: libxposed
      run: |
        echo 'org.gradle.parallel=true' >> ~/.gradle/gradle.properties
        echo 'org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8' >> ~/.gradle/gradle.properties
        cd api
        ./gradlew :api:publishToMavenLocal -x :checks:compileKotlin
        cd ../service
        ./gradlew :interface:publishToMavenLocal

    - name: Build with Gradle
      run: |
        echo 'org.gradle.parallel=true' >> gradle.properties
        echo 'org.gradle.jvmargs=-Xmx2048m' >> gradle.properties
        echo 'android.native.buildOutput=verbose' >> gradle.properties
        ./gradlew buildAll

    - name: Upload Debug artifact
      uses: actions/upload-artifact@v4
      with:
        name: opatch-debug
        path: out/debug/*

    - name: Upload Release artifact
      uses: actions/upload-artifact@v4
      with:
        name: opatch-release
        path: out/release/*
